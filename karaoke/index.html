<!doctype html><html lang="zh-Hant"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><meta name="theme-color" content="#101522"><meta name="apple-mobile-web-app-capable" content="yes"><meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"><meta name="apple-mobile-web-app-title" content="私人練唱"><link rel="manifest" href="manifest.webmanifest"><link rel="apple-touch-icon" href="icon.svg"><title>私人練唱室</title><style>
:root{color-scheme:dark;--bg:#080b12;--card:#151c2b;--line:#ffffff18;--text:#f8fbff;--muted:#9aa8bd;--p:#8d7cff;--p2:#43d7d0;--danger:#ff5c7c}*{box-sizing:border-box}html,body{margin:0;min-height:100%;background:radial-gradient(circle at top,#18203a,var(--bg) 42%);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}body{padding:env(safe-area-inset-top) 0 env(safe-area-inset-bottom)}main{width:min(920px,100%);margin:auto;padding:18px 14px 44px}.top,.row,.head{display:flex;align-items:center;justify-content:space-between;gap:12px}.top{margin-bottom:16px}h1,h2,h3,p{margin-top:0}h1{margin-bottom:0;font-size:clamp(28px,7vw,44px)}h2{margin-bottom:6px}.ey{font-size:12px;letter-spacing:.14em;color:var(--p2);font-weight:800;margin-bottom:3px}.muted,.hint{color:var(--muted)}.hint{font-size:13px;line-height:1.55}.card{background:linear-gradient(180deg,#1c2436f5,#0e131ef5);border:1px solid var(--line);border-radius:22px;padding:18px;margin-bottom:14px;box-shadow:0 18px 50px #0006}.hero{min-height:150px;display:flex;align-items:center;justify-content:space-between;gap:14px}.btn,button,a{border:0;border-radius:15px;padding:12px 16px;color:white;text-decoration:none;text-align:center;font:inherit;cursor:pointer}.primary{background:linear-gradient(135deg,var(--p),#5d9fff);font-weight:750}.secondary,.toggle,.round{background:#263149}.danger{background:linear-gradient(135deg,var(--danger),#ff875f);font-weight:750}.ghost{background:transparent;border:1px solid var(--line)}.file{display:inline-flex;justify-content:center;min-width:130px}.time{display:grid;grid-template-columns:50px 1fr 50px;align-items:center;gap:8px;color:var(--muted)}input[type=range]{width:100%;accent-color:var(--p)}.transport{display:flex;justify-content:center;align-items:center;gap:22px;margin:22px 0}.round{width:54px;height:54px;padding:0;border-radius:50%}.play{width:74px;height:74px;padding:0;border-radius:50%;font-size:28px;background:linear-gradient(135deg,var(--p),var(--p2))}.quick{display:grid;grid-template-columns:repeat(4,1fr);gap:9px}.toggle.active{outline:1px solid var(--p);background:#8d7cff2e}.cols{display:grid;grid-template-columns:1fr 1fr;gap:14px}.control label{display:flex;justify-content:space-between;margin:13px 0 7px}.full{width:100%;margin-top:14px}.actions{display:flex;gap:9px;flex-wrap:wrap}.result{display:grid;gap:10px;margin-top:14px;padding-top:14px;border-top:1px solid var(--line)}audio{width:100%}textarea{width:100%;min-height:210px;border:1px solid var(--line);border-radius:16px;background:#0c111b;color:var(--text);padding:14px;font:inherit;line-height:1.65}.hidden{display:none!important}button:disabled{opacity:.45}.notice{font-size:14px;line-height:1.55;color:#d6deeb}@media(max-width:700px){.hero{align-items:flex-start;flex-direction:column}.file{width:100%}.quick{grid-template-columns:1fr 1fr}.cols{grid-template-columns:1fr}.top{align-items:flex-start}}
</style></head><body><main><header class="top"><div><p class="ey">PRIVATE KARAOKE</p><h1>私人練唱室</h1></div><span class="hint">Safari 分享 → 加入主畫面</span></header>
<section class="card hero"><div><p id="status">先匯入自己合法擁有的歌曲</p><h2 id="title">尚未選擇歌曲</h2><p id="meta" class="muted">支援 MP3、M4A、WAV、AAC（依手機而定）</p></div><label class="btn primary file">選擇歌曲<input id="file" type="file" accept="audio/*" hidden></label></section>
<section class="card"><audio id="song" preload="metadata"></audio><div class="time"><span id="now">00:00</span><input id="seek" type="range" min="0" max="1000" value="0"><span id="dur">00:00</span></div><div class="transport"><button id="back" class="round">−10</button><button id="play" class="play">▶</button><button id="forward" class="round">+10</button></div><div class="quick"><button id="remove" class="toggle">基本去人聲</button><button id="boost" class="toggle">人聲強化</button><button id="hall" class="toggle">舞台音場</button><button id="monitor" class="toggle">耳返</button></div></section>
<section class="cols"><article class="card control"><h3>歌曲調整</h3><label>速度 <output id="speedO">1.00×</output></label><input id="speed" type="range" min="0.75" max="1.25" step="0.01" value="1"><label>歌曲音量 <output id="musicO">90%</output></label><input id="music" type="range" min="0" max="1" step="0.01" value="0.9"><p class="hint">速度會同時改變音高；目前不是獨立變調。</p></article><article class="card control"><h3>麥克風</h3><label>人聲音量 <output id="micO">100%</output></label><input id="mic" type="range" min="0" max="2" step="0.01" value="1"><label>回音 <output id="echoO">12%</output></label><input id="echo" type="range" min="0" max="0.6" step="0.01" value="0.12"><button id="micBtn" class="secondary full">啟用麥克風</button></article></section>
<section class="card"><div class="head"><div><p class="ey">RECORDING</p><h3>錄下伴奏＋自己的聲音</h3><p id="recState" class="muted">尚未錄音</p></div><div class="actions"><button id="record" class="danger">開始錄音</button><button id="stop" class="secondary" disabled>停止</button></div></div><div id="result" class="result hidden"><audio id="recorded" controls></audio><a id="download" class="btn primary" download>下載錄音</a></div></section>
<section class="card"><div class="head"><div><p class="ey">LYRICS / NOTES</p><h3>歌詞與練唱筆記</h3></div><button id="save" class="ghost">儲存</button></div><textarea id="lyrics" placeholder="貼上自己合法取得的歌詞，或記下換氣、轉音與容易走音的位置。"></textarea></section>
<section class="card notice"><strong>隱私：</strong>歌曲與錄音只在這台裝置處理，不會自動上傳。基本去人聲是中央聲道消除，不能等同專業 AI 分離。開耳返前請戴耳機，避免尖銳回授聲。</section></main><script>
const $=x=>document.getElementById(x),song=$('song'),play=$('play'),seek=$('seek');let S={ctx:null,src:null,music:null,normal:null,cancel:null,micStream:null,micGain:null,filter:null,echoGain:null,monitorGain:null,reverbGain:null,mix:null,rec:null,chunks:[],remove:false,boost:false,hall:false,monitor:false};const status=t=>$('status').textContent=t,fmt=n=>Number.isFinite(n)?`${String(Math.floor(n/60)).padStart(2,'0')}:${String(Math.floor(n%60)).padStart(2,'0')}`:'00:00';
function graph(){if(S.ctx)return;let A=window.AudioContext||window.webkitAudioContext;if(!A)throw Error('此瀏覽器不支援 Web Audio');S.ctx=new A;S.src=S.ctx.createMediaElementSource(song);S.music=S.ctx.createGain();S.normal=S.ctx.createGain();S.cancel=S.ctx.createGain();S.mix=S.ctx.createMediaStreamDestination();S.src.connect(S.music);S.music.connect(S.normal);S.normal.connect(S.ctx.destination);S.normal.connect(S.mix);let sp=S.ctx.createChannelSplitter(2),mg=S.ctx.createChannelMerger(2),il=S.ctx.createGain(),ir=S.ctx.createGain();il.gain.value=ir.gain.value=-1;S.music.connect(sp);sp.connect(mg,0,0);sp.connect(ir,1);ir.connect(mg,0,0);sp.connect(mg,1,1);sp.connect(il,0);il.connect(mg,0,1);mg.connect(S.cancel);S.cancel.connect(S.ctx.destination);S.cancel.connect(S.mix);S.normal.gain.value=1;S.cancel.gain.value=0;S.music.gain.value=.9}
async function resume(){graph();if(S.ctx.state==='suspended')await S.ctx.resume()}
$('file').onchange=async e=>{let f=e.target.files?.[0];if(!f)return;await resume();song.src=URL.createObjectURL(f);$('title').textContent=f.name.replace(/\.[^.]+$/,'');$('meta').textContent=`${(f.size/1048576).toFixed(1)} MB · 僅在此裝置播放`;status('歌曲已匯入，可以開始練唱')};song.onloadedmetadata=()=> $('dur').textContent=fmt(song.duration);song.ontimeupdate=()=>{$('now').textContent=fmt(song.currentTime);seek.value=song.duration?Math.round(song.currentTime/song.duration*1000):0};song.onplay=()=>play.textContent='❚❚';song.onpause=song.onended=()=>play.textContent='▶';play.onclick=async()=>{if(!song.src)return status('請先選擇歌曲');await resume();song.paused?await song.play():song.pause()};$('back').onclick=()=>song.currentTime=Math.max(0,song.currentTime-10);$('forward').onclick=()=>song.currentTime=Math.min(song.duration||0,song.currentTime+10);seek.oninput=()=>{if(song.duration)song.currentTime=+seek.value/1000*song.duration};$('speed').oninput=e=>{song.playbackRate=+e.target.value;$('speedO').textContent=(+e.target.value).toFixed(2)+'×'};$('music').oninput=async e=>{await resume();S.music.gain.value=+e.target.value;$('musicO').textContent=Math.round(+e.target.value*100)+'%'};
const active=(id,on)=>$(id).classList.toggle('active',on);$('remove').onclick=async()=>{await resume();S.remove=!S.remove;S.normal.gain.setTargetAtTime(S.remove?0:1,S.ctx.currentTime,.02);S.cancel.gain.setTargetAtTime(S.remove?1:0,S.ctx.currentTime,.02);active('remove',S.remove);status(S.remove?'已啟用基本去人聲；部分歌曲可能變薄或失真':'已關閉基本去人聲')};
function impulse(c,d=2.2,k=2.5){let b=c.createBuffer(2,c.sampleRate*d,c.sampleRate);for(let ch=0;ch<2;ch++){let a=b.getChannelData(ch);for(let i=0;i<a.length;i++)a[i]=(Math.random()*2-1)*Math.pow(1-i/a.length,k)}return b}
async function mic(){await resume();if(S.micStream)return;S.micStream=await navigator.mediaDevices.getUserMedia({audio:{echoCancellation:false,noiseSuppression:true,autoGainControl:false}});let src=S.ctx.createMediaStreamSource(S.micStream),f=S.ctx.createBiquadFilter(),dry=S.ctx.createGain(),delay=S.ctx.createDelay(1),echo=S.ctx.createGain(),mon=S.ctx.createGain(),conv=S.ctx.createConvolver(),rev=S.ctx.createGain();S.micGain=S.ctx.createGain();S.filter=f;S.echoGain=echo;S.monitorGain=mon;S.reverbGain=rev;f.type='peaking';f.frequency.value=2500;f.Q.value=.8;delay.delayTime.value=.18;conv.buffer=impulse(S.ctx);mon.gain.value=0;rev.gain.value=0;S.micGain.gain.value=+$('mic').value;echo.gain.value=+$('echo').value;src.connect(S.micGain);S.micGain.connect(f);f.connect(dry);dry.connect(S.mix);dry.connect(mon);mon.connect(S.ctx.destination);f.connect(delay);delay.connect(echo);echo.connect(S.mix);echo.connect(mon);f.connect(conv);conv.connect(rev);rev.connect(S.mix);rev.connect(mon);$('micBtn').textContent='麥克風已啟用';active('micBtn',true);status('麥克風已啟用')}
$('micBtn').onclick=async()=>{try{await mic()}catch(e){status('無法啟用麥克風：'+e.message)}};$('mic').oninput=e=>{if(S.micGain)S.micGain.gain.value=+e.target.value;$('micO').textContent=Math.round(+e.target.value*100)+'%'};$('echo').oninput=e=>{if(S.echoGain)S.echoGain.gain.value=+e.target.value;$('echoO').textContent=Math.round(+e.target.value*100)+'%'};
$('boost').onclick=async()=>{try{await mic()}catch(e){return status('無法啟用麥克風：'+e.message)}S.boost=!S.boost;S.filter.gain.setTargetAtTime(S.boost?5:0,S.ctx.currentTime,.03);active('boost',S.boost)};$('hall').onclick=async()=>{try{await mic()}catch(e){return status('無法啟用麥克風：'+e.message)}S.hall=!S.hall;S.reverbGain.gain.setTargetAtTime(S.hall?.28:0,S.ctx.currentTime,.03);active('hall',S.hall)};$('monitor').onclick=async()=>{try{await mic()}catch(e){return status('無法啟用麥克風：'+e.message)}S.monitor=!S.monitor;S.monitorGain.gain.setTargetAtTime(S.monitor?1:0,S.ctx.currentTime,.03);active('monitor',S.monitor);if(S.monitor)status('耳返已開啟；請戴耳機避免回授聲')};
$('record').onclick=async()=>{try{await mic();if(!window.MediaRecorder)throw Error('此瀏覽器不支援錄音');S.chunks=[];let opt=MediaRecorder.isTypeSupported('audio/mp4')?{mimeType:'audio/mp4'}:MediaRecorder.isTypeSupported('audio/webm;codecs=opus')?{mimeType:'audio/webm;codecs=opus'}:undefined;S.rec=new MediaRecorder(S.mix.stream,opt);S.rec.ondataavailable=e=>{if(e.data.size)S.chunks.push(e.data)};S.rec.onstop=()=>{let mime=S.rec.mimeType||'audio/webm',blob=new Blob(S.chunks,{type:mime}),url=URL.createObjectURL(blob),ext=mime.includes('mp4')?'m4a':mime.includes('ogg')?'ogg':'webm';$('recorded').src=url;$('download').href=url;$('download').download='私人練唱錄音.'+ext;$('result').classList.remove('hidden');$('recState').textContent=`錄音完成 · ${(blob.size/1048576).toFixed(1)} MB`};S.rec.start(1000);$('record').disabled=true;$('stop').disabled=false;$('recState').textContent='錄音中…';if(song.src&&song.paused)await song.play()}catch(e){$('recState').textContent='錄音失敗：'+e.message}};$('stop').onclick=()=>{if(S.rec&&S.rec.state!=='inactive')S.rec.stop();$('record').disabled=false;$('stop').disabled=true};$('lyrics').value=localStorage.getItem('private-karaoke-lyrics')||'';$('save').onclick=()=>{localStorage.setItem('private-karaoke-lyrics',$('lyrics').value);status('歌詞與筆記已儲存在此裝置')};if('serviceWorker'in navigator)addEventListener('load',()=>navigator.serviceWorker.register('./sw.js').catch(()=>{}));
</script></body></html>
